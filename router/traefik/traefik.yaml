global:
  checkNewVersion: true

log:
  level: "DEBUG"
  #filePath: "/var/log/traefik/log-file.log"
  filePath: ""

accessLog:
  #filePath: "/var/log/traefik/log-access.log"
  filePath: ""
  bufferingSize: 100

api: {}
#  insecure: true

entryPoints:
  http:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: ':443'
          scheme: https
  https:
    address: ":443"
    http:
      tls: true

providers:
  docker:
    exposedByDefault: false
    network: container-dmz
  file:
    filename: /etc/traefik/dynamic.yaml
    watch: true

serversTransport:
  # This is needed to avoid validating any internal certificates
  insecureSkipVerify: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: cohoe.grant@gmail.com
      storage: /certs/acme.json
#      httpChallenge:
#        entryPoint: external-http
      dnsChallenge:
        provider: namecheap
        resolvers:
          - "156.154.132.200:53" # dns1.registrar-servers.com.
          - "156.154.133.200:53" # dns2.registrar-servers.com.
          - "8.8.8.8:53" # dns.google.
        delayBeforeCheck: 10
