---
services:
  traefik:
    image: docker.io/library/traefik:v3.5
    command: --api.insecure=true --providers.docker
    ports:
      - ${ROUTER_BIND_ADDRESS}:80:80
      - ${ROUTER_BIND_ADDRESS}:443:443
    volumes:
      - ./traefik:/etc/traefik
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/logs/traefik:/var/log/traefik
      #- /opt/certs:/certs
      - traefik_certs:/certs
    restart: always
    extra_hosts:
      - 'host.docker.internal:172.17.0.1'
    env_file:
      - /opt/CampFitch/secrets/router.env
    networks:
      - container-dmz
#?    secrets:
#?      - wildcard_cert
#?      - wildcard_key
    labels:
      - "traefik.enable=true"
      #- "traefik.http.routers.api.middlewares=api-auth"
      #- "traefik.http.middlewares.api-auth.basicauth.usersFile=/run/secrets/auth.db"

networks:
  container-dmz:
    external: true

#?secrets:
#?  wildcard_cert:
#?    file: /opt/CampFitch/secrets/wildcard_cert
#?  wildcard_key:
#?    file: /opt/CampFitch/secrets/wildcard_key

volumes:
  traefik_certs:
    external: true
