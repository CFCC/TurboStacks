# Samba users configuration for dockurr/samba
# Format: username:UID:groupname:GID:password:homedir
#
# - username: The textual name of the user
# - UID: The numerical id of the user (must match host UID for file permissions)
# - groupname: The textual name of the primary user group
# - GID: The numerical id of the primary user group (must match host GID)
# - password: The clear text password (cannot contain : or newlines)
# - homedir: Optional home directory
#
# Example entries (replace with your actual users):
# alice:1001:camp-rw:1002:secretpass
# bob:1002:camp-ro:1003:otherpass
# admin:1000:wheel:10:adminpass
#
# To find existing UIDs/GIDs on the host, run:
#   getent passwd username
#   getent group groupname
