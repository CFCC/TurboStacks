---
services:
  dockhand:
    image: docker.io/fnsys/dockhand:v1.0.28
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dockhand:/app/data:rw
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dockhand.rule=Host(`dockhand.apps.campcomputer.com`)"
    networks:
      - container-dmz
