#
# WARNING: To install Immich, follow our guide: https://immich.app/docs/install/docker-compose
#
# Make sure to use the docker-compose.yml of the current release:
#
# https://github.com/immich-app/immich/releases/latest/download/docker-compose.yml
#
# The compose file on main may not be compatible with the latest release.
services:
  server:
    image: ghcr.io/immich-app/immich-server:release
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    volumes:
      - /mnt/Photos/Upload:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
      - /mnt/Photos/Photos:/mnt/Photos-External:ro
      - /mnt/Photos/Photos:/mnt/Photos-Shared:ro
    env_file:
      - /opt/CampFitch/secrets/immich.env
    labels:
      traefik.enable: true
      traefik.http.routers.immich.rule: Host(`photos.apps.campcomputer.com`)
      traefik.http.services.immich.loadbalancer.server.port: 2283
      traefik.http.routers.immich.tls.certresolver: namecheap
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      disable: false
    networks:
      - container-dmz
      - backend

  immich-machine-learning:
    # For hardware acceleration, add one of -[armnn, cuda, rocm, openvino, rknn] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:release
    # extends: # uncomment this section for hardware acceleration - see https://immich.app/docs/features/ml-hardware-acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, rocm, openvino, openvino-wsl, rknn] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    volumes:
      - model-cache:/cache
    env_file:
      - /opt/CampFitch/secrets/immich.env
    restart: always
    healthcheck:
      disable: false
    networks:
      - container-dmz
      - backend

  redis:
    image: docker.io/valkey/valkey:8-bookworm@sha256:facc1d2c3462975c34e10fccb167bfa92b0e0dbd992fc282c29a61c3243afb11
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always
    networks:
      - backend

  database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:5f6a838e4e44c8e0e019d0ebfe3ee8952b69afc2809b2c25f7b0119641978e91
    volumes:
      # Do not edit the next line. If you want to change the database storage location on your system, edit the value of DB_DATA_LOCATION in the .env file
      #- ${DB_DATA_LOCATION}:/var/lib/postgresql/data
      - immich_database:/var/lib/postgresql/data:rw
    shm_size: 128mb
    restart: always
    networks:
      - backend
    env_file:
      - /opt/CampFitch/secrets/immich.env

  folder-album-creator:
    image: salvoxia/immich-folder-album-creator:latest
    restart: unless-stopped
    volumes:
     # mount needed for .albumprops to work
     - /mnt/Photos/Photos:/external_libs/photos:ro
    env_file:
      - /opt/CampFitch/secrets/immich.env
    networks:
      - backend

  shared-library:
    # Build locally
    image: immich-shared-library-immich-shared-library
    volumes:
      - /mnt/Photos/Upload:/usr/src/app/upload
      - /mnt/Photos/Photos:/mnt/Photos-External:ro
      - /mnt/Photos/Photos:/mnt/Photos-Shared:ro
      - ./config.yaml:/app/config.yaml:ro
    env_file:
      - /opt/CampFitch/secrets/immich.env
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080')"]
      interval: 30s
      timeout: 5s
      retries: 3

  folder-album-creator-camper:
    image: salvoxia/immich-folder-album-creator:latest
    restart: unless-stopped
    volumes:
     # mount needed for .albumprops to work
     - /mnt/Photos/Photos:/external_libs/photos:ro
    env_file:
      - /opt/CampFitch/secrets/immich-camper.env
    networks:
      - backend

networks:
  backend:
    internal: true
  container-dmz:
    external: true

volumes:
  model-cache:
  immich_database:
    external: true
